<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Trading</title>

    <link rel="stylesheet" href="main.css">
</head>
<body>

<div class="container">

    <header>
        <h2>🎮 عرض تجاره </h2>

        <button class="create-btn" id="create-btn">
            + انشاء عرض
        </button>
    </header>

    <div class="search-box">
        <input
            type="text"
            placeholder="Search offers..."
        >
    </div>

    <div class="offers">

        

    </div>
     

</div>

</div>
<div id="offerModal" class="modal">

    <div class="modal-content">

        <h2>انشاء عرض</h2>

        <input type="text" id="image" placeholder="رابط الصورة">

        

        

        <input type="text" id="offering" placeholder="المنتج المعروض">

        <input type="text" id="wants" placeholder="المنتجات المرغوبة">

        <div class="buttons">
            <button id="saveOffer">Create</button>
            <button id="closeModal">Cancel</button>
        </div>

    </div>

</div>
<!-- زر الرسائل -->
<div class="chat-float" id="chatToggle">
    💬
</div>

<!-- قائمة المحادثات -->
<div class="chat-panel" id="chatPanel">

    <div class="chat-header">
        المحادثات
    </div>

    <div class="chat-users">

       

        

    </div>

</div>

<!-- نافذة المحادثة -->

<div class="chat-box" id="chatBox">

    <div class="chat-box-header">
        <span id="chatName">...</span>
    </div>

    <div class="messages" id="messages">

    </div>

    <div class="chat-input">

        <input
            type="text"
            id="messageInput"
            placeholder="اكتب رسالة..."
            
        >

        <button onclick="sendMessage()">➤</button>

    </div>

</div>
<script src="/socket.io/socket.io.js"></script>
<script>
    const search = document.querySelector("input");
const cards = document.querySelectorAll(".card");
const createBtn = document.getElementById("create-btn");
const modal = document.getElementById("offerModal");
const closeModal = document.getElementById("closeModal");
const saveOffer = document.getElementById("saveOffer");
const socket = io();

socket.emit("join");
var offers = [];
let interval;
modal.addEventListener("click", (e) => {
    if (e.target === modal) {
        modal.classList.remove("show");
    }
});

createBtn.addEventListener("click", () => {
    modal.classList.add("show");
});
closeModal.addEventListener("click", () => {
    modal.classList.remove("show");
});

saveOffer.addEventListener("click", () => {

    createoffer(
        {
            image: document.getElementById("image").value,
            
            offering: document.getElementById("offering").value,
            wants: document.getElementById("wants").value
        }
    );

    modal.classList.remove("show");

});
search.addEventListener("input", () => {

    const value = search.value.trim().toLowerCase();

    const filtered = offers.filter(item => {

        return (
            item.title.toLowerCase().includes(value) ||
            item.seller.toLowerCase().includes(value) ||
            item.offering.toLowerCase().includes(value) ||
            item.wants.toLowerCase().includes(value)
        );

    });

    renderOffers(filtered);

});
const offersContainer = document.querySelector(".offers");

function renderOffers(list) {

    offersContainer.innerHTML = "";

    list.forEach(item => {

        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = item.image;
        img.alt = "";

        const info = document.createElement("div");
        info.className = "info";

        const title = document.createElement("h3");
        title.textContent = item.title;

        const seller = document.createElement("p");
        seller.innerHTML = "<b>البائع:</b> ";
        seller.appendChild(document.createTextNode(item.seller));

        const offering = document.createElement("p");
        offering.innerHTML = "<b>المنتج المعروض:</b> ";
        offering.appendChild(document.createTextNode(item.offering));

        const wants = document.createElement("p");
        wants.innerHTML = "<b>المنتجات المرغوبة:</b> ";
        wants.appendChild(document.createTextNode(item.wants));

        const button = document.createElement("button");
        button.textContent = "تواصل";

        info.appendChild(title);
        info.appendChild(seller);
        info.appendChild(offering);
        info.appendChild(wants);
        info.appendChild(button);

        card.appendChild(img);
        card.appendChild(info);

        offersContainer.appendChild(card);
        if (item.seller === localStorage.getItem("username")) {
            button.textContent = "حذف"
            button.style.backgroundColor = "red"
            button.addEventListener("click", () => {
                fetch(`/system/delete-offer`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ offerId: item._id })
                })
                .then(response => response.json())
                .then(data => {
                    alert("تم حذف العرض بنجاح");
                    getoffers(); // Refresh the offers list after deleting an offer
                })
                .catch(error => {
                    console.error("Error deleting offer:", error);
                });
            });
        } 
        else {
            button.addEventListener("click", () => {
                createChat(item.seller);
            });
        }

    });

}
getoffers()
function getoffers() {
    fetch(" /system/offers")
        .then(response => response.json())
        .then(data => {
            console.log("Fetched offers:", data);
            offers = data.offers;
            localStorage.setItem("username", data.user);
            renderOffers(offers);
        })
        .catch(error => {
            console.error("Error fetching offers:", error);
        });
}
function createoffer(data) {
    fetch(" /system/create", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
           image: data.image,
            title: "عرض جديد",
            offering: data.offering,
            wants: data.wants
        })
    })
    .then(response => response.json())
        .then(data => {
            console.log("Offer created:", data);
            getoffers(); // Refresh the offers list after creating a new offer
        })
        .catch(error => {
            console.error("Error creating offer:", error);
        });

}
const chatToggle=document.getElementById("chatToggle");
const chatPanel=document.getElementById("chatPanel");
const chatBox=document.getElementById("chatBox");
const input=document.getElementById("messageInput");
input.addEventListener("keydown", (e) => {

    if (e.key === "Enter") {
        e.preventDefault(); // يمنع السلوك الافتراضي إذا كان داخل form
        sendMessage();
    }

});
chatToggle.onclick=()=>{

chatPanel.style.display=
chatPanel.style.display==="flex"
?"none":"flex";
chatBox.style.display="none";
clearInterval(interval);
};

function openChat(name){
clearInterval(interval);
chatBox.style.display="flex";
getmessages(name);
document.getElementById("chatName").innerText=name;



}
function sendMessage(){



if(input.value=="") return;
if (input.value.length>100) {
    alert("الرسالة طويلة جدا");
    return;
}
if(input.value == "/delete"){ 
    deletechat();
    alert("تم حذف المحادثة بنجاح");
    return;
}
const div=document.createElement("div");

div.className="message mine";

div.innerText=input.value;

document.getElementById("messages").appendChild(div);




socket.emit("send-message", {
    from: "zeyad",
    to: "ahmed",
    message: "Hello"
});

fetch("/messages/", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
       text: input.value,
       to: document.getElementById("chatName").innerText

    })

}
).then(response => response.json())
    .then(data => {
        console.log("Message sent:", data);
        input.value="";
        document.getElementById("messages").scrollTop=
        document.getElementById("messages").scrollHeight;
    })
    .catch(error => {
        console.error("Error sending message:", error);
    });

}

function getchats() {
    fetch("/messages/chats")
        .then(response => response.json())
        .then(data => {
            document.querySelector(".chat-users").innerHTML = "";
            console.log("Fetched chats:", data);
            data.chats.forEach(chat => {
                if (chat.to !== localStorage.getItem("username")) {
                    adduser(chat.to);
                }else {
                    adduser(chat.from);
                }
            });
        })
        .catch(error => {
            console.error("Error fetching chats:", error);
        });
}
getchats();

function createChat(name) {
    
    fetch(`/messages/chatcreate`,{
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            to: name
        })

    })
        .then(response => response.json())
        .then(data => {
            console.log("Fetched messages:", data);
            if (data.error) {
                alert(data.error);
            } else {
                adduser(name);
                alert("تم انشاء المحادثة بنجاح");
            }
        })
        .catch(error => {
           
            console.error("Error fetching messages:", error);
        });
}


function receiveMessage(msg) {
    const div = document.createElement("div");
    div.className = "message other";
    div.innerText = msg;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop =
        document.getElementById("messages").scrollHeight;
}
function adduser(name) {
    const userDiv = document.createElement("div");
    userDiv.className = "chat-user";
    userDiv.onclick = () => openChat(name);

    const img = document.createElement("img");
    img.src = `https://i.pravatar.cc/40?u=${name}`;
    img.alt = name;

    const span = document.createElement("span");
    span.textContent = name;

    userDiv.appendChild(img);
    userDiv.appendChild(span);

    document.querySelector(".chat-users").appendChild(userDiv);
}

function getmessages(name) {
    fetch(`/messages/getmessages/${name}`, {
        method: "GET",
        headers: {
            "Content-Type": "application/json"
        }
    })
        .then(response => response.json())

        .then(data => {
            console.log("Fetched messages:", data);
            document.getElementById("messages").innerHTML = "";
            data.messages.forEach(msg => {
                const div = document.createElement("div");
                div.className = msg.from === localStorage.getItem("username") ? "message mine" : "message other";
                div.innerText = msg.text;
                document.getElementById("messages").appendChild(div);
            
            });
            document.getElementById("messages").scrollTop =
                document.getElementById("messages").scrollHeight;
            
        })
        .catch(error => {
            console.error("Error fetching messages:", error);
        });
}
function deletechat(){
    fetch(`/messages/deletechat/${document.getElementById("chatName").textContent}`, {
        method: "DELETE",
        headers: {
            "Content-Type": "application/json"
        }
    })
        .then(response => response.json())
        .then(data => {
            console.log("Chat deleted:", data);
            
            document.getElementById("messages").innerHTML = "";
            document.getElementById("chatName").innerText = "...";
            chatBox.style.display = "none";
            getchats();
        })
        .catch(error => {
            console.error("Error deleting chat:", error);
        });
}
socket.on("receive-message", (message) => {

    getmessages(document.getElementById("chatName").textContent);

});
socket.on("receive-chat", (from) => {
    adduser(from);
});
socket.on("refresh-chats", () => {
    getchats();
});
// رسالتي

</script>

</body>
</html>
